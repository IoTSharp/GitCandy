name: ASP.NET Core migration

on:
  pull_request:
    paths:
      - ".github/workflows/aspnet-core-migration.yml"
      - ".github/workflows/release.yml"
      - ".config/dotnet-tools.json"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.override.yml"
      - ".dockerignore"
      - "deploy/**"
      - "docs/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "GitCandy.slnx"
      - "global.json"
      - "src/**"
      - "tests/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/aspnet-core-migration.yml"
      - ".github/workflows/release.yml"
      - ".config/dotnet-tools.json"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.override.yml"
      - ".dockerignore"
      - "deploy/**"
      - "docs/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "GitCandy.slnx"
      - "global.json"
      - "src/**"
      - "tests/**"

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test GitCandy.slnx
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Validate migration solution
        shell: pwsh
        run: ./tools/migration/m1-012/Invoke-M1SolutionValidation.ps1 -Configuration Release

  container:
    name: Validate Docker image and Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose
        run: |
          docker compose config --quiet
          docker compose --file docker-compose.yml config --quiet

      - name: Build image
        run: docker build --tag gitcandy:ci .
